<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#4e8cff"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- rounded-square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- subtle inner glow -->
  <rect x="24" y="24" width="464" height="464" rx="80" ry="80"
        fill="none" stroke="rgba(255,255,255,0.16)" stroke-width="4"/>

  <!-- piano keys: 7 white keys across the lower half -->
  <g transform="translate(56 208)">
    <g fill="#fafaf7" stroke="#2a2a3a" stroke-width="3">
      <rect x="0"   y="0" width="56" height="224" rx="6"/>
      <rect x="57"  y="0" width="56" height="224" rx="6"/>
      <rect x="114" y="0" width="56" height="224" rx="6"/>
      <rect x="171" y="0" width="56" height="224" rx="6"/>
      <rect x="228" y="0" width="56" height="224" rx="6"/>
      <rect x="285" y="0" width="56" height="224" rx="6"/>
      <rect x="342" y="0" width="56" height="224" rx="6"/>
    </g>
    <g fill="#121220">
      <rect x="38"  y="0" width="36" height="140" rx="4"/>
      <rect x="95"  y="0" width="36" height="140" rx="4"/>
      <rect x="209" y="0" width="36" height="140" rx="4"/>
      <rect x="266" y="0" width="36" height="140" rx="4"/>
      <rect x="323" y="0" width="36" height="140" rx="4"/>
    </g>
  </g>

  <!-- quarter note above the keyboard -->
  <g transform="translate(256 56) rotate(-8)">
    <ellipse cx="0" cy="104" rx="38" ry="28" fill="#fff"/>
    <rect x="30" y="-8" width="10" height="112" fill="#fff" rx="2"/>
    <path d="M40 -8 Q 96 8 80 68" stroke="#fff" stroke-width="10" fill="none" stroke-linecap="round"/>
  </g>
</svg>
