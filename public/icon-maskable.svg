        <rect x="0"   y="0" width="56" height="224" rx="6"/>
        <rect x="57"  y="0" width="56" height="224" rx="6"/>
        <rect x="114" y="0" width="56" height="224" rx="6"/>
        <rect x="171" y="0" width="56" height="224" rx="6"/>
        <rect x="228" y="0" width="56" height="224" rx="6"/>
        <rect x="285" y="0" width="56" height="224" rx="6"/>
        <rect x="342" y="0" width="56" height="224" rx="6"/>
      </g>
      <g fill="#121220">
        <rect x="38"  y="0" width="36" height="140" rx="4"/>
        <rect x="95"  y="0" width="36" height="140" rx="4"/>
        <rect x="209" y="0" width="36" height="140" rx="4"/>
        <rect x="266" y="0" width="36" height="140" rx="4"/>
        <rect x="323" y="0" width="36" height="140" rx="4"/>
